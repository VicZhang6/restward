<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站立提醒 - 控制面板</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            color-scheme: light;
            --accent: #4f46e5;
            --accent-soft: #6366f1;
            --window-bg: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
            --surface-bg: rgba(255, 255, 255, 0.94);
            --surface-border: rgba(148, 163, 184, 0.2);
            --surface-shadow: 0 24px 56px rgba(15, 23, 42, 0.14);
            --text-primary: #1a1a2e;
            --text-secondary: #9ca3af;
            --titlebar-height: 56px;
            --titlebar-left-space: 20px;
            --titlebar-right-space: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif;
            width: 100%;
            height: 100%;
        }

        body {
            background: var(--window-bg);
            color: var(--text-primary);
            overflow: hidden;
            user-select: none;
            padding: 0;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top left, rgba(99, 102, 241, 0.18), transparent 34%),
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.14), transparent 30%);
            pointer-events: none;
        }

        .app {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: calc(var(--titlebar-height) + 24px) 28px 48px;
            background: var(--surface-bg);
            border: 1px solid var(--surface-border);
            border-radius: 0;
            box-shadow: var(--surface-shadow);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        body.platform-darwin {
            background: transparent;
            padding: 12px;
        }

        body.platform-darwin .app {
            background: rgba(255, 255, 255, 0.72);
            border-radius: 30px;
            box-shadow: 0 28px 64px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(28px) saturate(140%);
            -webkit-backdrop-filter: blur(28px) saturate(140%);
        }

        body.platform-darwin {
            --titlebar-left-space: 74px;
        }

        body.platform-win32 .app,
        body.platform-linux .app {
            padding: calc(var(--titlebar-height) + 16px) 24px 28px;
            background: #ffffff;
            border: none;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.1);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        body.platform-win32 {
            --titlebar-right-space: 104px;
        }

        body.platform-linux {
            --titlebar-right-space: 104px;
        }

        body.platform-win32 .header,
        body.platform-linux .header {
            margin-bottom: 20px;
        }

        body.platform-win32 .progress-section,
        body.platform-linux .progress-section {
            margin-bottom: 20px;
        }

        body.platform-win32 .progress-ring,
        body.platform-win32 .progress-ring svg,
        body.platform-linux .progress-ring,
        body.platform-linux .progress-ring svg {
            width: 160px;
            height: 160px;
        }

        body.platform-win32 .time-display,
        body.platform-win32 .time-input,
        body.platform-linux .time-display,
        body.platform-linux .time-input {
            font-size: 32px;
        }

        body.platform-win32 .status-badge,
        body.platform-linux .status-badge {
            margin-bottom: 18px;
        }

        /* 标题栏拖拽区域 */
        .titlebar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: var(--titlebar-height);
            padding: 12px var(--titlebar-right-space) 12px var(--titlebar-left-space);
            -webkit-app-region: drag;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(255, 255, 255, 0.62) 100%);
            border-bottom: 1px solid rgba(226, 232, 240, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
        }

        .titlebar-badge {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 0;
            color: var(--accent);
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.16) 0%, rgba(99, 102, 241, 0.22) 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
        }

        .titlebar-badge svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            display: block;
        }

        .titlebar-copy {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .titlebar-title {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.02em;
            color: var(--text-primary);
        }

        /* Windows / Linux：自定义最小化、关闭（悬停浅灰圆角底） */
        .window-controls {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: center;
            gap: 2px;
            padding-right: 10px;
            padding-left: 6px;
            -webkit-app-region: no-drag;
            z-index: 101;
        }

        body.platform-win32 .window-controls,
        body.platform-linux .window-controls {
            display: flex;
        }

        .win-btn {
            width: 38px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.12s ease;
        }

        .win-btn:hover {
            background: rgba(15, 23, 42, 0.07);
        }

        .win-btn:active {
            background: rgba(15, 23, 42, 0.11);
        }

        .win-btn svg {
            flex-shrink: 0;
            stroke: currentColor;
            fill: none;
        }

        .win-btn-minimize svg {
            width: 10px;
            height: 10px;
        }

        .win-btn-close svg {
            width: 11px;
            height: 11px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #1a1a2e;
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 圆形进度 */
        .progress-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 28px;
        }

        .progress-ring {
            position: relative;
            width: 180px;
            height: 180px;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
            width: 180px;
            height: 180px;
        }

        .progress-ring .bg {
            fill: none;
            stroke: #f0f0f5;
            stroke-width: 8;
        }

        .progress-ring .fg {
            fill: none;
            stroke: url(#grad);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .progress-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .time-display {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #1a1a2e;
            line-height: 1;
            cursor: pointer;
            border-radius: 12px;
            padding: 4px 8px;
            transition: background 0.2s ease;
        }

        .time-display:hover {
            background: rgba(79, 70, 229, 0.08);
        }

        .time-input {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--accent-soft);
            line-height: 1;
            width: 130px;
            text-align: center;
            border: none;
            border-bottom: 3px solid var(--accent-soft);
            background: transparent;
            outline: none;
            padding: 4px 8px;
            border-radius: 0;
            font-family: inherit;
            display: none;
        }

        .time-input.active {
            display: block;
        }

        .time-display.hidden {
            display: none;
        }

        .time-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .time-label.editing {
            color: var(--accent-soft);
        }

        /* 状态标签 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 24px;
            justify-content: center;
        }

        .status-badge.running {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .status-badge.stopped {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .status-badge .indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-badge.running .indicator {
            background: #10b981;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .status-badge.stopped .indicator {
            background: #ef4444;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
        }

        /* 控制按钮区域 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 18px rgba(79, 70, 229, 0.22);
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 26px rgba(99, 102, 241, 0.32);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary.is-running {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            box-shadow: 0 4px 18px rgba(217, 119, 6, 0.22);
        }

        .btn-primary.is-running:hover {
            box-shadow: 0 8px 26px rgba(245, 158, 11, 0.3);
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
        }

        /* 间隔设置 */
        .interval-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(148, 163, 184, 0.08);
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .interval-label {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
        }

        .interval-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .interval-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #f8fafc;
            font-size: 16px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .interval-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #334155;
        }

        .interval-btn:active {
            transform: scale(0.95);
        }

        .interval-value {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            min-width: 60px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="titlebar">
        <div class="titlebar-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </div>
        <div class="titlebar-copy">
            <div class="titlebar-title">站立提醒</div>
        </div>
        <div class="window-controls" id="windowControls">
            <button type="button" class="win-btn win-btn-minimize" title="最小化" aria-label="最小化">
                <svg viewBox="0 0 10 10" aria-hidden="true">
                    <path d="M0 5h10" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
                </svg>
            </button>
            <button type="button" class="win-btn win-btn-close" title="关闭" aria-label="关闭">
                <svg viewBox="0 0 10 10" aria-hidden="true">
                    <path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
                </svg>
            </button>
        </div>
    </div>
    <div class="app">
        <div class="header">
            <h1>站立提醒</h1>
            <p>保持健康，定时活动</p>
        </div>

        <div class="progress-section">
            <div class="progress-ring">
                <svg viewBox="0 0 180 180">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#4f46e5" />
                            <stop offset="100%" style="stop-color:#6366f1" />
                        </linearGradient>
                    </defs>
                    <circle class="bg" cx="90" cy="90" r="78" />
                    <circle class="fg" id="progressCircle" cx="90" cy="90" r="78" stroke-dasharray="490.09"
                        stroke-dashoffset="490.09" />
                </svg>
                <div class="progress-center">
                    <div class="time-display" id="timeDisplay">20:00</div>
                    <input class="time-input" id="timeInput" type="text" maxlength="5" placeholder="MM:SS" />
                    <div class="time-label" id="timeLabel">剩余时间</div>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: center;">
            <div class="status-badge stopped" id="statusBadge">
                <span class="indicator"></span>
                <span id="statusText">未开始</span>
            </div>
        </div>

        <div class="controls">
            <div class="interval-section">
                <span class="interval-label">提醒间隔</span>
                <div class="interval-control">
                    <button class="interval-btn" id="decreaseBtn">−</button>
                    <span class="interval-value" id="intervalValue">20 分钟</span>
                    <button class="interval-btn" id="increaseBtn">+</button>
                </div>
            </div>

            <button class="btn-primary" id="toggleBtn">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
                    <polygon points="5,3 19,12 5,21" />
                </svg>
                <span id="toggleText">开始计时</span>
            </button>
        </div>
    </div>

    <script src="control-renderer.js"></script>
</body>

</html>
