<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站立提醒菜单</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            color-scheme: light;
            --menu-bg: #ffffff;
            --menu-border: #e2e8f0;
            --menu-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 10px 15px -3px rgba(0, 0, 0, 0.08),
                0 20px 40px -8px rgba(0, 0, 0, 0.12);
            --text-main: #1e293b;
            --text-subtle: #64748b;
            --text-muted: #94a3b8;
            --item-hover: #f1f5f9;
            --item-active: #e2e8f0;
            --divider: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #fef2f2;
            --danger-active: #fee2e2;
            --accent: #6366f1;
            --accent-soft: #e0e7ff;
            --header-bg: #f8fafc;
            --status-idle: #94a3b8;
            --status-running: #10b981;
            --status-paused: #f59e0b;
            --kbd-bg: #f1f5f9;
            --kbd-border: #e2e8f0;
            --icon-color: #64748b;
            --icon-hover: #475569;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --menu-bg: #0f172a;
            --menu-border: #1e293b;
            --menu-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.2),
                0 10px 15px -3px rgba(0, 0, 0, 0.3),
                0 20px 40px -8px rgba(0, 0, 0, 0.4);
            --text-main: #f1f5f9;
            --text-subtle: #94a3b8;
            --text-muted: #64748b;
            --item-hover: #1e293b;
            --item-active: #334155;
            --divider: #334155;
            --danger: #f87171;
            --danger-hover: #3f1e21;
            --danger-active: #522024;
            --accent: #818cf8;
            --accent-soft: #312e81;
            --header-bg: #1e293b;
            --status-idle: #64748b;
            --status-running: #34d399;
            --status-paused: #fbbf24;
            --kbd-bg: #1e293b;
            --kbd-border: #334155;
            --icon-color: #94a3b8;
            --icon-hover: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 240px;
            height: auto;
            overflow: hidden;
            border-radius: 14px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            user-select: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .menu-shell {
            width: 100%;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--menu-border);
            border-radius: 14px;
            background: var(--menu-bg);
            box-shadow: var(--menu-shadow);
            overflow: hidden;
        }

        .menu-header {
            padding: 16px 16px 12px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--menu-border);
        }

        .menu-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .menu-status-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
        }

        .time-display {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: var(--accent-soft);
            color: var(--accent);
            transition: all 0.2s ease;
        }

        .status-badge::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge.running {
            background: #dcfce7;
            color: #166534;
        }

        .status-badge.paused {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.idle {
            background: #f1f5f9;
            color: #64748b;
        }

        :root[data-theme="dark"] .status-badge.running {
            background: #064e3b;
            color: #34d399;
        }

        :root[data-theme="dark"] .status-badge.paused {
            background: #451a03;
            color: #fbbf24;
        }

        :root[data-theme="dark"] .status-badge.idle {
            background: #334155;
            color: #94a3b8;
        }

        .menu-body {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .menu-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .menu-divider {
            height: 1px;
            margin: 6px 0;
            background: var(--divider);
        }

        .menu-item {
            width: 100%;
            padding: 9px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            color: var(--icon-color);
            transition: color 0.15s ease;
        }

        .menu-item-content {
            flex: 1;
            min-width: 0;
        }

        .menu-item-kbd {
            display: inline-flex;
            align-items: center;
            padding: 2px 6px;
            border-radius: 5px;
            background: var(--kbd-bg);
            border: 1px solid var(--kbd-border);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-subtle);
            font-family: 'Inter', monospace;
            transition: all 0.15s ease;
        }

        .menu-item:hover:not(:disabled),
        .menu-item:focus-visible:not(:disabled) {
            background: var(--item-hover);
            outline: none;
        }

        .menu-item:hover:not(:disabled) .menu-item-icon,
        .menu-item:focus-visible:not(:disabled) .menu-item-icon {
            color: var(--icon-hover);
        }

        .menu-item:active:not(:disabled) {
            background: var(--item-active);
            transform: scale(0.98);
        }

        .menu-item:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .menu-item:disabled .menu-item-icon {
            color: var(--text-muted);
        }

        .menu-item.danger {
            color: var(--danger);
        }

        .menu-item.danger .menu-item-icon {
            color: var(--danger);
        }

        .menu-item.danger:hover:not(:disabled),
        .menu-item.danger:focus-visible:not(:disabled) {
            background: var(--danger-hover);
        }

        .menu-item.danger:active:not(:disabled) {
            background: var(--danger-active);
        }

        .menu-footer {
            padding: 10px 16px 12px;
            background: var(--header-bg);
            border-top: 1px solid var(--menu-border);
        }

        .menu-hint {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }

        .menu-hint kbd {
            display: inline-flex;
            align-items: center;
            padding: 1px 4px;
            border-radius: 4px;
            background: var(--kbd-bg);
            border: 1px solid var(--kbd-border);
            font-size: 10px;
            font-weight: 600;
            font-family: 'Inter', monospace;
            margin: 0 2px;
        }
    </style>
</head>

<body>
    <div class="menu-shell">
        <div class="menu-header">
            <div class="menu-title">站立提醒</div>
            <div class="menu-status-row">
                <span class="time-display" id="remainingTimeLabel">20:00</span>
                <span class="status-badge idle" id="statusLabel">待开始</span>
            </div>
        </div>

        <div class="menu-body">
            <div class="menu-section">
                <button class="menu-item" id="toggleAction" data-command="toggle-timer">
                    <svg class="menu-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <span class="menu-item-content" id="toggleActionLabel">开始计时</span>
                    <kbd class="menu-item-kbd" id="toggleActionHint">Space</kbd>
                </button>
                <button class="menu-item" id="resetAction" data-command="reset-timer">
                    <svg class="menu-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"></path>
                    </svg>
                    <span class="menu-item-content">重置</span>
                </button>
            </div>

            <div class="menu-divider"></div>

            <div class="menu-section">
                <button class="menu-item" data-command="show-main">
                    <svg class="menu-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="9" y1="21" x2="9" y2="9"></line>
                    </svg>
                    <span class="menu-item-content">打开主面板</span>
                </button>
                <button class="menu-item" data-command="hide-floating">
                    <svg class="menu-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                    <span class="menu-item-content">隐藏悬浮窗</span>
                </button>
            </div>

            <div class="menu-divider"></div>

            <div class="menu-section">
                <button class="menu-item danger" data-command="quit-app">
                    <svg class="menu-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span class="menu-item-content">退出应用</span>
                </button>
            </div>
        </div>

        <div class="menu-footer">
            <div class="menu-hint">
                按 <kbd>Esc</kbd> 关闭菜单
            </div>
        </div>
    </div>

    <script type="module" src="floating-menu-renderer.js"></script>
</body>

</html>
