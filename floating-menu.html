<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站立提醒菜单</title>
    <style>
        :root {
            color-scheme: light;
            --menu-bg: #f8fafc;
            --menu-border: #cbd5e1;
            --menu-shadow: 0 16px 34px rgba(15, 23, 42, 0.18);
            --text-main: #0f172a;
            --text-subtle: #475569;
            --item-hover: #e0f2fe;
            --item-active: #dbeafe;
            --divider: #e2e8f0;
            --danger: #dc2626;
            --danger-hover: #fee2e2;
            --accent: #0f766e;
            --accent-soft: #ccfbf1;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --menu-bg: #0f172a;
            --menu-border: #334155;
            --menu-shadow: 0 16px 34px rgba(2, 6, 23, 0.34);
            --text-main: #f8fafc;
            --text-subtle: #94a3b8;
            --item-hover: #132f46;
            --item-active: #0f3a55;
            --divider: #1e293b;
            --danger: #f87171;
            --danger-hover: #3a1d24;
            --accent: #5eead4;
            --accent-soft: #123b39;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 216px;
            height: auto;
            overflow: hidden;
            background: transparent;
            border-radius: 18px;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            user-select: none;
        }

        .menu-shell {
            width: 100%;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid var(--menu-border);
            border-radius: 18px;
            background: var(--menu-bg);
            box-shadow: var(--menu-shadow);
        }

        .menu-header {
            padding: 8px 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .menu-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
        }

        .menu-subtitle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            color: var(--text-subtle);
        }

        .status-pill {
            padding: 3px 8px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
        }

        .menu-divider {
            height: 1px;
            background: var(--divider);
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .menu-item {
            width: 100%;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
        }

        .menu-item:hover:not(:disabled),
        .menu-item:focus-visible:not(:disabled) {
            background: var(--item-hover);
            outline: none;
        }

        .menu-item:active:not(:disabled) {
            background: var(--item-active);
        }

        .menu-item:disabled {
            opacity: 0.42;
            cursor: not-allowed;
        }

        .menu-item.danger {
            color: var(--danger);
        }

        .menu-item.danger:hover:not(:disabled),
        .menu-item.danger:focus-visible:not(:disabled) {
            background: var(--danger-hover);
        }

        .menu-meta {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-subtle);
        }
    </style>
</head>

<body>
    <div class="menu-shell">
        <div class="menu-header">
            <div class="menu-title">悬浮窗快捷操作</div>
            <div class="menu-subtitle">
                <span id="remainingTimeLabel">剩余 20:00</span>
                <span class="status-pill" id="statusLabel">待开始</span>
            </div>
        </div>

        <div class="menu-divider"></div>

        <div class="menu-list">
            <button class="menu-item" id="toggleAction" data-command="toggle-timer">
                <span id="toggleActionLabel">开始计时</span>
                <span class="menu-meta" id="toggleActionHint">Space</span>
            </button>
            <button class="menu-item" id="resetAction" data-command="reset-timer">
                <span>重置</span>
                <span class="menu-meta">归零</span>
            </button>
            <button class="menu-item" data-command="show-main">
                <span>打开主面板</span>
                <span class="menu-meta">双击也可</span>
            </button>
            <button class="menu-item" data-command="hide-floating">
                <span>隐藏悬浮窗</span>
                <span class="menu-meta">稍后再开</span>
            </button>
        </div>

        <div class="menu-divider"></div>

        <div class="menu-list">
            <button class="menu-item danger" data-command="quit-app">
                <span>退出应用</span>
                <span class="menu-meta">彻底关闭</span>
            </button>
        </div>
    </div>

    <script type="module" src="floating-menu-renderer.js"></script>
</body>

</html>
