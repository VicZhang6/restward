<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站立提醒悬浮窗</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap');

        :root {
            color-scheme: light;
            /* 运行中 - 青绿 */
            --color-running: #10b981;
            /* 暂停 - 琥珀 */
            --color-paused: #f59e0b;
            /* 空闲 - 灰 */
            --color-idle: #9ca3af;
            /* 深色背景 */
            --bg-base: #1f2937;
            --bg-running: #064e3b;
            --bg-paused: #78350f;
            --bg-idle: #374151;
            /* 状态条 */
            --bar-running: #10b981;
            --bar-paused: #f59e0b;
            --bar-idle: #6b7280;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --color-running: #34d399;
            --color-paused: #fbbf24;
            --color-idle: #9ca3af;
            --bg-base: #111827;
            --bg-running: #022c22;
            --bg-paused: #451a03;
            --bg-idle: #1f2937;
            --bar-running: #34d399;
            --bar-paused: #fbbf24;
            --bar-idle: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: var(--bg-base);
            user-select: none;
        }

        /* 紧凑悬浮窗 - 类似迅雷下载框 */
        .floating-timer {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-idle);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            cursor: default;
            transition: background 0.2s ease;
        }

        /* 底部状态条 */
        .floating-timer::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--bar-idle);
            transition: background 0.2s ease;
        }

        /* 状态样式 */
        .floating-timer.is-running {
            background: var(--bg-running);
        }

        .floating-timer.is-running::after {
            background: var(--bar-running);
        }

        .floating-timer.is-paused {
            background: var(--bg-paused);
        }

        .floating-timer.is-paused::after {
            background: var(--bar-paused);
        }

        .floating-timer.is-idle {
            background: var(--bg-idle);
        }

        .floating-timer.is-idle::after {
            background: var(--bar-idle);
        }

        /* 倒计时数字 */
        .time-display {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-idle);
            font-variant-numeric: tabular-nums;
            transition: color 0.2s ease;
        }

        .floating-timer.is-running .time-display {
            color: var(--color-running);
        }

        .floating-timer.is-paused .time-display {
            color: var(--color-paused);
        }

        /* 右键菜单 */
        .context-menu {
            position: fixed;
            min-width: 120px;
            padding: 4px;
            display: none;
            flex-direction: column;
            gap: 2px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            z-index: 20;
        }

        .context-menu.visible {
            display: flex;
        }

        .menu-item {
            width: 100%;
            border: none;
            border-radius: 4px;
            padding: 6px 10px;
            text-align: left;
            background: transparent;
            color: #e5e7eb;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .menu-item:hover:not(:disabled) {
            background: #374151;
        }

        .menu-item.muted {
            color: #9ca3af;
        }

        .menu-item:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .menu-divider {
            height: 1px;
            background: #374151;
            margin: 4px 0;
        }
    </style>
</head>

<body>
    <div class="floating-timer is-idle" id="floatingTimer">
        <div class="time-display" id="remainingTime">20:00</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <button class="menu-item" id="toggleAction">开始</button>
        <button class="menu-item" id="resetAction">重置</button>
        <button class="menu-item" data-action="show-main">主面板</button>
        <div class="menu-divider"></div>
        <button class="menu-item muted" data-action="hide-floating">隐藏</button>
        <button class="menu-item muted" data-action="quit-app">退出</button>
    </div>

    <script type="module" src="floating-renderer.js"></script>
</body>

</html>
