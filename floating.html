<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站立提醒悬浮窗</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');

        :root {
            color-scheme: light;
            --shadow-inner: inset 0 1px 0 rgba(255, 255, 255, 0.22);
            --grad-idle: linear-gradient(145deg, #64748b 0%, #475569 45%, #334155 100%);
            --grad-running: linear-gradient(145deg, #818cf8 0%, #6366f1 40%, #4f46e5 100%);
            --grad-paused: linear-gradient(145deg, #fbbf24 0%, #f59e0b 45%, #d97706 100%);
            --text: #ffffff;
            --dot-idle: rgba(255, 255, 255, 0.55);
            --dot-running: #bbf7d0;
            --dot-paused: #fef3c7;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --shadow-inner: inset 0 1px 0 rgba(255, 255, 255, 0.12);
            --grad-idle: linear-gradient(145deg, #575f6a 0%, #3d4450 50%, #2d333b 100%);
            --grad-running: linear-gradient(145deg, #8b93f5 0%, #6366f1 42%, #4338ca 100%);
            --grad-paused: linear-gradient(145deg, #fcd34d 0%, #f59e0b 50%, #b45309 100%);
            --dot-idle: rgba(255, 255, 255, 0.45);
            --dot-running: #86efac;
            --dot-paused: #fde68a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            border-radius: 22px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            user-select: none;
        }

        .floating-timer {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: default;
            background: var(--grad-idle);
            border-radius: 22px;
            box-shadow: var(--shadow-inner);
            overflow: hidden;
            transition: background 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .floating-timer.is-running {
            background: var(--grad-running);
        }

        .floating-timer.is-paused {
            background: var(--grad-paused);
        }

        .floating-timer.is-idle {
            background: var(--grad-idle);
        }

        .floating-timer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 16px 0 14px;
        }

        .floating-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dot-idle);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .floating-timer.is-running .floating-status-dot {
            background: var(--dot-running);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.25), 0 0 12px rgba(134, 239, 172, 0.55);
            animation: pulse-dot 1.6s ease-in-out infinite;
        }

        .floating-timer.is-paused .floating-status-dot {
            background: var(--dot-paused);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2);
            animation: none;
        }

        .floating-timer.is-idle .floating-status-dot {
            animation: none;
        }

        @keyframes pulse-dot {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.85;
                transform: scale(0.92);
            }
        }

        .time-display {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
        }
    </style>
</head>

<body>
    <div class="floating-timer is-idle" id="floatingTimer">
        <div class="floating-timer-inner">
            <span class="floating-status-dot" aria-hidden="true"></span>
            <div class="time-display" id="remainingTime">20:00</div>
        </div>
    </div>

    <script type="module" src="floating-renderer.js"></script>
</body>

</html>
