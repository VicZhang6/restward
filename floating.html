<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站立提醒悬浮窗</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');

        :root {
            color-scheme: light;
            --bg-idle: #e2e8f0;
            --bg-running: #10b981;
            --bg-paused: #f59e0b;
            --text-idle: #334155;
            --text-active: #ffffff;
            --dot-idle: #64748b;
            --dot-running: #ffffff;
            --dot-paused: #ffffff;
            --shadow:
                0 2px 4px rgba(0, 0, 0, 0.06),
                0 4px 8px rgba(0, 0, 0, 0.08),
                0 8px 16px rgba(0, 0, 0, 0.1),
                0 16px 32px rgba(0, 0, 0, 0.12);
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --bg-idle: #0f172a;
            --bg-running: #059669;
            --bg-paused: #d97706;
            --text-idle: #64748b;
            --text-active: #f1f5f9;
            --dot-idle: #334155;
            --dot-running: #34d399;
            --dot-paused: #fbbf24;
            --shadow:
                0 2px 4px rgba(0, 0, 0, 0.2),
                0 4px 8px rgba(0, 0, 0, 0.3),
                0 8px 16px rgba(0, 0, 0, 0.4),
                0 16px 32px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 18px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            user-select: none;
        }

        .floating-timer {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: default;
            background: var(--bg-idle);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .floating-timer.is-running {
            background: var(--bg-running);
        }

        .floating-timer.is-paused {
            background: var(--bg-paused);
        }

        .floating-timer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 16px;
        }

        .floating-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--dot-idle);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .floating-timer.is-running .floating-status-dot {
            background: var(--dot-running);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
            animation: pulse-dot 1.6s ease-in-out infinite;
        }

        .floating-timer.is-paused .floating-status-dot {
            background: var(--dot-paused);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
            animation: none;
        }

        .floating-timer.is-idle .floating-status-dot {
            animation: none;
        }

        @keyframes pulse-dot {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.85;
                transform: scale(0.92);
            }
        }

        .time-display {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-idle);
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .floating-timer.is-running .time-display,
        .floating-timer.is-paused .time-display {
            color: var(--text-active);
        }
    </style>
</head>

<body>
    <div class="floating-timer is-idle" id="floatingTimer">
        <div class="floating-timer-inner">
            <span class="floating-status-dot" aria-hidden="true"></span>
            <span class="time-display" id="remainingTime">20:00</span>
        </div>
    </div>

    <script type="module" src="floating-renderer.js"></script>
</body>

</html>
