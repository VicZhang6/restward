# 在 GitHub 的 Apple Silicon（ARM64）macOS runner 上构建 DMG。
# 本地 Windows 无法为 macOS 产出可用安装包，请用本工作流或在一台 Mac（M 系列）上执行 npm run build。
name: Build macOS (Apple Silicon / ARM64)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build app (Tauri release, native aarch64)
        run: npm run build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: standup-reminder-macos-arm64-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload to Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
